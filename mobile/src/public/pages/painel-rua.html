<div id="page-painel" class="page-content layout-rua active-page" style="grid-template-columns: repeat(3, 1fr);">
    <div class="channel-box" id="box-speed">
        <div class="channel-label">Velocidade</div>
        <div class="channel-value" id="val-speed">0</div>
    </div>
    <div class="channel-box" id="box-gear">
        <div class="channel-label">Marcha</div>
        <div class="channel-value" id="val-gear">N</div>
    </div>
    <div class="channel-box tc-active" id="box-tc" onclick="toggleTractionControl()">
        <div class="channel-label">Controle de Tração</div>
        <div class="tc-status-lbl" id="tc-status-text">ATIVO</div>
    </div>
    <div class="channel-box" id="box-power">
        <div class="channel-label">Carga Motor</div>
        <div class="channel-value" id="val-power">0%</div>
    </div>
</div>
