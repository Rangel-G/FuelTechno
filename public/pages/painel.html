<div id="page-painel" class="page-content layout-diario active-page">
    <div class="channel-box" id="box-speed">
        <div class="channel-label">Velocidade VSS</div>
        <div class="channel-value" id="val-speed">0</div>
        <div class="channel-unit">KM/H</div>
    </div>

    <div class="channel-box" id="box-gear">
        <div class="channel-label">Marcha</div>
        <div class="channel-value" id="val-gear">N</div>
        <div class="channel-unit">GEAR</div>
    </div>

    <div class="channel-box tc-active" id="box-tc" onclick="toggleTractionControl()">
        <div class="channel-label">Controle de Tração</div>
        <div class="tc-status-lbl" id="tc-status-text">ATIVO</div>
        <div class="channel-unit" style="text-align:center;">TOQUE P/ ALTERNAR</div>
    </div>

    <div class="channel-box" id="box-ect">
        <div class="channel-label">Temp. Motor</div>
        <div class="channel-value" id="val-ect">0</div>
        <div class="channel-unit">°C</div>
    </div>

    <div class="channel-box" id="box-power">
        <div class="channel-label">Força Motor</div>
        <div class="channel-value" id="val-power">0%</div>
        <div class="channel-unit">LOAD</div>
    </div>

    <div class="channel-box" id="box-map">
        <div class="channel-label">Pressão MAP</div>
        <div class="channel-value" id="val-map">0.00</div>
        <div class="channel-unit">BAR</div>
    </div>

    <div class="channel-box" id="box-fpress">
        <div class="channel-label">Pres. Comb.</div>
        <div class="channel-value" id="val-fpress">N/D</div>
        <div class="channel-unit">BAR</div>
    </div>
</div>
