<div id="page-painel" class="page-content layout-pista active-page" style="grid-template-columns: repeat(3, 1fr);">
    <div class="channel-box box-pequena" id="box-rpm-pista" style="grid-column: span 3;">
        <div class="channel-label">Rotação Motor</div>
        <div class="channel-value" id="val-rpm">0</div>
        <div class="channel-unit">RPM</div>
    </div>

    <div class="channel-box box-pequena" id="box-ect">
        <div class="channel-label">Temp. Motor</div>
        <div class="channel-value" id="val-ect">0</div>
        <div class="channel-unit">°C</div>
    </div>

    <div class="channel-box box-pequena" id="box-map">
        <div class="channel-label">Pressão MAP</div>
        <div class="channel-value" id="val-map">0.00</div>
        <div class="channel-unit">BAR</div>
    </div>

    <div class="channel-box box-pequena" id="box-gear">
        <div class="channel-label">Marcha</div>
        <div class="channel-value" id="val-gear">N</div>
        <div class="channel-unit">GEAR</div>
    </div>

    <div class="channel-box box-pequena" id="box-speed">
        <div class="channel-label">Velocidade</div>
        <div class="channel-value" id="val-speed">0</div>
        <div class="channel-unit">KM/H</div>
    </div>

    <div class="channel-box box-pequena" id="box-power" style="grid-column: span 2;">
        <div class="channel-label">Carga do Motor</div>
        <div class="channel-value" id="val-power">0%</div>
        <div class="channel-unit">LOAD</div>
    </div>
</div>
